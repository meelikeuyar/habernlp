<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaberNLP — Turkish News Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Georgia', serif;
            background: #f8f6f1;
            color: #1a1a1a
        }

        .topbar {
            background: #1a1a1a;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px
        }

        .logo span {
            color: #e63946
        }

        .tarih-bilgi {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-family: system-ui
        }

        .guncelle-btn {
            padding: 7px 16px;
            font-size: 12px;
            background: #e63946;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: system-ui
        }

        .guncelle-btn:hover {
            background: #c62828
        }

        .guncelle-btn:disabled {
            opacity: 0.5;
            cursor: wait
        }

        .ticker-bar {
            background: #111;
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-family: system-ui
        }

        .ticker-content {
            display: inline-block;
            animation: scroll 60s linear infinite
        }

        @keyframes scroll {
            0% {
                transform: translateX(100%)
            }

            100% {
                transform: translateX(-100%)
            }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem
        }

        .stat-card {
            background: #fff;
            border: 1px solid #e0ddd4;
            padding: 1.2rem;
            text-align: center
        }

        .stat-num {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-family: system-ui;
            margin-top: 4px
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem
        }

        .card {
            background: #fff;
            border: 1px solid #e0ddd4;
            padding: 1.5rem
        }

        .card h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 1rem;
            font-family: system-ui;
            font-weight: 600
        }

        .chart-container {
            position: relative;
            height: 250px
        }

        .kelime-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px
        }

        .kelime-bar .label {
            width: 90px;
            text-align: right;
            font-family: system-ui;
            color: #555
        }

        .kelime-bar .bar {
            height: 18px;
            background: #1a1a1a;
            min-width: 4px;
            transition: width 0.6s ease
        }

        .kelime-bar .val {
            font-family: system-ui;
            font-size: 11px;
            color: #999
        }

        .haber-list {
            list-style: none
        }

        .haber-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0ede6;
            display: flex;
            gap: 12px;
            align-items: flex-start
        }

        .haber-item:last-child {
            border-bottom: none
        }

        .haber-kaynak {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #1a1a1a;
            color: #fff;
            padding: 2px 6px;
            font-family: system-ui;
            white-space: nowrap;
            margin-top: 3px
        }

        .haber-baslik {
            font-size: 14px;
            line-height: 1.4
        }

        .haber-baslik a {
            color: #1a1a1a;
            text-decoration: none
        }

        .haber-baslik a:hover {
            color: #e63946
        }

        .sentiment-badge {
            display: inline-block;
            font-size: 9px;
            padding: 1px 6px;
            font-family: system-ui;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 8px;
            vertical-align: middle
        }

        .sentiment-pozitif {
            background: #e8f5e9;
            color: #2e7d32
        }

        .sentiment-negatif {
            background: #fce4ec;
            color: #c62828
        }

        .sentiment-notr,
        .sentiment-nötr {
            background: #f5f5f5;
            color: #757575
        }

        .footer {
            text-align: center;
            padding: 2rem;
            font-size: 11px;
            color: #aaa;
            font-family: system-ui;
            border-top: 1px solid #e0ddd4
        }

        @media(max-width:768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr)
            }

            .grid-2 {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="logo">Haber<span>NLP</span></div>
        <div class="tarih-bilgi" id="tarih"></div>
        <button class="guncelle-btn" onclick="guncelle()">&#8635; Güncelle</button>
    </div>
    <div class="ticker-bar">
        <div class="ticker-content" id="ticker">Haberler yükleniyor...</div>
    </div>
    <div class="container">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="s-toplam">&mdash;</div>
                <div class="stat-label">Toplam haber</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="s-pozitif" style="color:#2e7d32">&mdash;</div>
                <div class="stat-label">Pozitif</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="s-negatif" style="color:#c62828">&mdash;</div>
                <div class="stat-label">Negatif</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="s-kaynak">&mdash;</div>
                <div class="stat-label">Kaynak</div>
            </div>
        </div>
        <div class="card" style="margin-bottom:2rem">
            <h3>Günlük duygu trendi</h3>
            <div class="chart-container"><canvas id="trendChart"></canvas></div>
        </div>
        <div class="grid-2">
            <div class="card">
                <h3>Duygu dağılımı</h3>
                <div class="chart-container"><canvas id="duyguChart"></canvas></div>
            </div>
            <div class="card">
                <h3>Kaynak dağılımı</h3>
                <div class="chart-container"><canvas id="kaynakChart"></canvas></div>
            </div>
        </div>
        <div class="grid-2">
            <div class="card">
                <h3>Öne çıkan kelimeler (TF-IDF)</h3>
                <div id="kelimeler"></div>
            </div>
            <div class="card">
                <h3>Son haberler</h3>
                <ul class="haber-list" id="haberler"></ul>
            </div>
        </div>
    </div>
    <div class="footer">HaberNLP v2.0 — BERT-powered Turkish News Intelligence</div>
    <script>
        const API = '';
        let duyguChart, kaynakChart, trendChart;
        document.getElementById('tarih').textContent = new Date().toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        async function loadAnaliz() {
            try {
                const r = await fetch(API + '/api/analiz'); const d = await r.json(); if (d.hata) return;
                document.getElementById('s-toplam').textContent = d.toplam;
                document.getElementById('s-pozitif').textContent = d.duygu.pozitif;
                document.getElementById('s-negatif').textContent = d.duygu.negatif;
                document.getElementById('s-kaynak').textContent = d.kaynaklar.length;
                const dCtx = document.getElementById('duyguChart').getContext('2d');
                if (duyguChart) duyguChart.destroy();
                duyguChart = new Chart(dCtx, { type: 'doughnut', data: { labels: ['Pozitif', 'Negatif', 'Nötr'], datasets: [{ data: [d.duygu.pozitif, d.duygu.negatif, d.duygu.notr], backgroundColor: ['#2e7d32', '#c62828', '#9e9e9e'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
                const kCtx = document.getElementById('kaynakChart').getContext('2d');
                if (kaynakChart) kaynakChart.destroy();
                kaynakChart = new Chart(kCtx, { type: 'bar', data: { labels: d.kaynaklar.map(k => k.ad), datasets: [{ data: d.kaynaklar.map(k => k.sayi), backgroundColor: '#1a1a1a', borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false } } } } });
                const kw = d.kelimeler_tfidf || []; const maxS = kw.length ? Math.max(...kw.map(k => k.skor)) : 1;
                document.getElementById('kelimeler').innerHTML = kw.map(k => '<div class="kelime-bar"><div class="label">' + k.kelime + '</div><div class="bar" style="width:' + (k.skor / maxS * 200) + 'px"></div><div class="val">' + k.skor + '</div></div>').join('');
            } catch (e) { console.error('Analiz error:', e) }
        }

        async function loadHaberler() {
            try {
                const r = await fetch(API + '/api/haberler?limit=20'); const d = await r.json(); const list = d.articles || [];
                document.getElementById('ticker').textContent = list.slice(0, 10).map(h => '● ' + h.kaynak + ': ' + h.baslik).join('     ');
                document.getElementById('haberler').innerHTML = list.slice(0, 15).map(h => '<li class="haber-item"><span class="haber-kaynak">' + h.kaynak + '</span><span class="haber-baslik"><a href="' + h.url + '" target="_blank">' + h.baslik + '</a>' + (h.sentiment ? '<span class="sentiment-badge sentiment-' + h.sentiment + '">' + h.sentiment + '</span>' : '') + '</span></li>').join('');
            } catch (e) { console.error('Haberler error:', e) }
        }

        async function loadTrends() {
            try {
                const r = await fetch(API + '/api/trends?gun=7'); const d = await r.json(); const days = d.days || []; if (!days.length) return;
                const ctx = document.getElementById('trendChart').getContext('2d');
                if (trendChart) trendChart.destroy();
                trendChart = new Chart(ctx, {
                    type: 'line', data: {
                        labels: days.map(d => d.tarih.slice(5)), datasets: [
                            { label: 'Pozitif', data: days.map(d => d.pozitif), borderColor: '#2e7d32', backgroundColor: 'rgba(46,125,50,0.1)', fill: true, tension: 0.3 },
                            { label: 'Negatif', data: days.map(d => d.negatif), borderColor: '#c62828', backgroundColor: 'rgba(198,40,40,0.1)', fill: true, tension: 0.3 },
                            { label: 'Nötr', data: days.map(d => d.notr), borderColor: '#9e9e9e', backgroundColor: 'rgba(158,158,158,0.1)', fill: true, tension: 0.3 }
                        ]
                    }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true, grid: { color: '#f0ede6' } }, x: { grid: { display: false } } } }
                });
            } catch (e) { console.error('Trends error:', e) }
        }

        async function guncelle() {
            const btn = document.querySelector('.guncelle-btn'); btn.disabled = true; btn.textContent = 'Güncelleniyor...';
            try { await fetch(API + '/api/guncelle', { method: 'POST' }); await Promise.all([loadAnaliz(), loadHaberler(), loadTrends()]) } catch (e) { console.error(e) }
            btn.disabled = false; btn.textContent = '↻ Güncelle';
        }
        Promise.all([loadAnaliz(), loadHaberler(), loadTrends()]);
        setInterval(() => Promise.all([loadAnaliz(), loadHaberler(), loadTrends()]), 300000);
    </script>
</body>

</html>
