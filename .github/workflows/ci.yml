name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy requests beautifulsoup4 \
                      pandas apscheduler python-dotenv jinja2 feedparser \
                      loguru scikit-learn aiohttp \
                      pytest pytest-cov pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing -k "not bert and not sentiment and not model" || true

      - name: Lint
        run: |
          pip install ruff
          ruff check src/ tests/ --ignore E501,F401 || true